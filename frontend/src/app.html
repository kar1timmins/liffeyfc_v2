<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Organization Structured Data -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Organization",
			"name": "Liffey Founders Club",
			"url": "https://liffeyfoundersclub.com",
			"logo": "https://liffeyfoundersclub.com/img/event_june/image_1.jpg",
			"description": "Dublin's premier startup community. Practice your pitch, connect with investors, and grow your business at quarterly events.",
			"address": {
				"@type": "PostalAddress",
				"addressLocality": "Dublin",
				"addressCountry": "IE"
			},
			"sameAs": [],
			"contactPoint": {
				"@type": "ContactPoint",
				"contactType": "Registration",
				"email": "hello@liffeyfoundersclub.com"
			}
		}
		</script>
		
		<script>
			// Set theme ASAP to prevent flash on first paint
			try {
				const t = localStorage.getItem('theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
