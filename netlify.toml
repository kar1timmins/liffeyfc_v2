[build.environment]
  NODE_VERSION = "20"
  # Ensure devDependencies install in Netlify CI (adapter needed at build time)
  NPM_FLAGS = "--include=dev"
[build]
  base = "frontend"
  # Use npm ci to install exactly from lockfile (required for reproducible build & netlify adapter)
  # Avoid passing --omit=optional because Rollup's native binary is an optional dependency; omitting it breaks the build.
  command = "npm ci && npm run build"
  # The Netlify adapter outputs the static client assets here
  publish = ".svelte-kit/output/client"
