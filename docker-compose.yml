services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: liffeyfc-backend
    env_file:
      - .env
      - ./backend/.env
    environment:
      - PORT=3000
      - NODE_ENV=development
      - WEB3FORMS_ACCESS_KEY=${WEB3FORMS_ACCESS_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - APP_ENV=${APP_ENV:-development}
      - ENABLE_API_LOGS=${ENABLE_API_LOGS:-1}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: liffeyfc-frontend
    env_file:
      - .env
      - ./frontend/.env
    environment:
      - PUBLIC_RECAPTCHA_SITE_KEY=${PUBLIC_RECAPTCHA_SITE_KEY}
      - PUBLIC_DEBUG_LOGS=1
      - PUBLIC_APP_ENV=${APP_ENV:-development}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://backend:3000}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - WEB3FORMS_ACCESS_KEY=${WEB3FORMS_ACCESS_KEY}
      - APP_ENV=${APP_ENV:-development}
      - ENABLE_API_LOGS=${ENABLE_API_LOGS:-1}
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
