services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: liffeyfc-backend
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=development
      # JWT Configuration (required for authentication)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      # Database / TypeORM — read from root .env; prefer DATABASE_URL; fall back to DB_* vars
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # TypeORM configuration (for migrations and app logic)
      - TYPEORM_SYNCHRONIZE=${TYPEORM_SYNCHRONIZE:-true}
      # Application configuration
      - WEB3FORMS_ACCESS_KEY=${WEB3FORMS_ACCESS_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - APP_ENV=${APP_ENV:-development}
      - ENABLE_API_LOGS=${ENABLE_API_LOGS:-1}
      # Redis (for shared nonce storage)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: liffeyfc-frontend
    env_file:
      - .env
    environment:
      - PUBLIC_RECAPTCHA_SITE_KEY=${PUBLIC_RECAPTCHA_SITE_KEY}
      - PUBLIC_DEBUG_LOGS=1
      - PUBLIC_APP_ENV=${APP_ENV:-development}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://backend:3000}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - WEB3FORMS_ACCESS_KEY=${WEB3FORMS_ACCESS_KEY}
      - APP_ENV=${APP_ENV:-development}
      - ENABLE_API_LOGS=${ENABLE_API_LOGS:-1}
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: liffeyfc-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Map host port 5433 -> container 5432 to avoid conflicts with host Postgres
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: liffeyfc-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
    name: liffeyfc_pgdata
