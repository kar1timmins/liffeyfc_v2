name: Frontend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  build-and-publish-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps & build (frontend)
        working-directory: frontend
        env:
          PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.PUBLIC_RECAPTCHA_SITE_KEY }}
          PUBLIC_DEBUG_LOGS: 0
          PUBLIC_APP_ENV: production
        run: |
          npm install
          npm run build

      - name: Publish build to deployment branch (frontend-deploy)
        run: |
          DEPLOY_BRANCH=frontend-deploy
          rm -rf deploy && mkdir deploy
          cp -R frontend/build/. deploy/
          cd deploy
          # Prevent GitHub Pages Jekyll processing if ever used
          touch .nojekyll
          git init
          git checkout -b ${DEPLOY_BRANCH}
          git add .
          git -c user.name='github-actions' -c user.email='actions@github.com' commit -m 'Deploy frontend'
          git remote add origin https://oauth2:${DEPLOY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push --force origin ${DEPLOY_BRANCH}
        env:
          # DEPLOY_TOKEN is required for git authentication
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: (Optional) FTP upload to Blacknight
        if: env.FTP_HOST != ''
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_DIR: ${{ secrets.FTP_TARGET_DIR }}
        run: |
          if [ -z "$FTP_HOST" ]; then echo 'FTP creds not set; skipping.'; exit 0; fi
          sudo apt-get update -y && sudo apt-get install -y lftp
          lftp -e "open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST; set ssl:verify-certificate no; mirror -R --delete --parallel=4 deploy/ $FTP_TARGET_DIR; bye"

    # To use FTP step set repository secrets:
    #   FTP_HOST, FTP_USER, FTP_PASSWORD, FTP_TARGET_DIR (e.g. /public_html)
