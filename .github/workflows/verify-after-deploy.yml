name: Verify Escrows After Deploy

on:
  workflow_run:
    workflows: ["Deploy to Railway"]
    types: [completed]

jobs:
  verify-escrows:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./hardhat
        run: pnpm install --frozen-lockfile

      - name: Verify on Sepolia
        working-directory: ./hardhat
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          ETHEREUM_FACTORY_ADDRESS: ${{ secrets.ETHEREUM_FACTORY_ADDRESS }}
        run: pnpm exec hardhat run scripts/verify-latest-escrow.ts --network sepolia

      - name: Verify on Fuji
        working-directory: ./hardhat
        env:
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
          AVALANCHE_FUJI_RPC_URL: ${{ secrets.AVALANCHE_FUJI_RPC_URL }}
          AVALANCHE_FACTORY_ADDRESS: ${{ secrets.AVALANCHE_FACTORY_ADDRESS }}
        run: pnpm exec hardhat run scripts/verify-latest-escrow.ts --network fuji
