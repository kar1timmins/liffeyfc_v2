name: Docs consistency check

on:
  pull_request:
    paths:
      - '.github/**'
      - 'docs/**'
      - 'README.md'

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docs check script
        run: |
          chmod +x .github/scripts/check-copilot-instructions.sh
          ./.github/scripts/check-copilot-instructions.sh
        shell: bash
